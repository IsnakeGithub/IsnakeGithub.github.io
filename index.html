<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登陆页面</title>
    <link rel="stylesheet" href="css/tsetcss01.css">
    <link rel="icon" href="images/Thesquid.ink-Free-Flat-Sample-Space-rocket.ico">
    <!--一个图标库的样式-->
    <link rel="stylesheet" href="css/font-awesome-4.7.0/css/font-awesome.min.css">
</head>
<body>
  <div id="login-box">
        <h1>Login</h1>
         <div class="form">
              <div class="item">
                  <!-- <i></i>呈现修饰为斜体 -->
                  <i class="fa fa-user-circle-o" aria-hidden="true"></i>
                  <input type="text" placeholder="Username">
              </div>
               <div class="item">
                   <i class="fa fa-key" aria-hidden="true"></i>
                   <!--placeholder 文本框里面的提示 -->
                  <input type="text" placeholder="Password">
              </div>
             <button class="submit">Login</button>
         </div>
  </div>


</body>
</html>
